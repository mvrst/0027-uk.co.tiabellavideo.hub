# Codemagic — 0027-uk.co.tiabellavideo.hub (uk.co.tiabellavideo.hub)
# Flutter project root: app/
#
# Manual-first: start builds from the Codemagic UI (or API). All workflows use
# mac_mini_m2 (see docs/codemagic_setup.md).

workflows:
  store_screenshots:
    name: store_screenshots
    instance_type: mac_mini_m2
    max_build_duration: 45
    environment:
      flutter: stable
    scripts:
      - name: Flutter pub get
        script: |
          set -e
          cd app
          flutter pub get
      - name: Generate Play Store PNGs (widget goldens, no flutter drive)
        script: |
          set -e
          cd app
          flutter test test/screenshots/store_screenshot_golden_test.dart --update-goldens --tags store-screenshots
    artifacts:
      - app/test/screenshots/goldens/**/*.png

  qa_apk:
    name: qa_apk
    instance_type: mac_mini_m2
    max_build_duration: 45
    environment:
      flutter: stable
      android_signing:
        - 0027_upload
    scripts:
      - name: QA context, write and verify Android local.properties
        script: |
          set -e
          BUILD_DIR="${CM_BUILD_DIR:-$(pwd)}"
          cd "$BUILD_DIR"
          echo "=== qa_apk context ==="
          echo "CM_BUILD_DIR=${CM_BUILD_DIR:-<unset>}"
          echo "BUILD_DIR=$BUILD_DIR"
          echo "pwd=$(pwd)"
          echo "current_branch: $(git rev-parse --abbrev-ref HEAD)"
          echo "current_commit: $(git rev-parse HEAD)"
          FLUTTER_BIN="$(command -v flutter)"
          test -n "$FLUTTER_BIN"
          test -x "$FLUTTER_BIN" || test -f "$FLUTTER_BIN"
          FLUTTER_ROOT="$(dirname "$(dirname "$FLUTTER_BIN")")"
          test -f "$FLUTTER_ROOT/bin/flutter"
          SDK="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          test -n "$SDK"
          LP="$BUILD_DIR/app/android/local.properties"
          printf 'sdk.dir=%s\nflutter.sdk=%s\n' "$SDK" "$FLUTTER_ROOT" > "$LP"
          echo "local_properties_path: $LP"
          echo "--- local.properties ---"
          cat "$LP"
          echo "--- end local.properties ---"
          FP="$(grep '^flutter.sdk=' "$LP" | cut -d= -f2-)"
          test -n "$FP"
          test -d "$FP"
          test -f "$FP/bin/flutter"
          echo "verified flutter.sdk directory and bin/flutter: $FP"
      - name: Flutter pub get
        script: |
          set -e
          BUILD_DIR="${CM_BUILD_DIR:-$(pwd)}"
          cd "$BUILD_DIR/app"
          flutter pub get
      - name: Gradle assembleRelease (APK, not AAB)
        script: |
          set -e
          BUILD_DIR="${CM_BUILD_DIR:-$(pwd)}"
          ANDROID_DIR="$BUILD_DIR/app/android"
          cd "$ANDROID_DIR"
          echo "pwd=$(pwd)"
          if [ -f ./gradlew ]; then
            echo "gradlew_exists: yes ($ANDROID_DIR/gradlew)"
          else
            echo "gradlew_exists: no"
            echo "Listing $ANDROID_DIR:" >&2
            ls -la "$ANDROID_DIR" >&2 || true
            exit 1
          fi
          chmod +x ./gradlew
          CMD="$ANDROID_DIR/gradlew assembleRelease --no-daemon --stacktrace"
          echo "exact_gradle_command: $CMD"
          ./gradlew assembleRelease --no-daemon --stacktrace
      - name: Verify APK output and fail if missing
        script: |
          set -e
          BUILD_DIR="${CM_BUILD_DIR:-$(pwd)}"
          # Direct Gradle from app/android — :app module outputs under app/android/app/build/...
          APK_DIR="$BUILD_DIR/app/android/app/build/outputs/apk/release"
          echo "qa_apk_apk_verification_directory: $APK_DIR"
          shopt -s nullglob
          apks=( "$APK_DIR"/*.apk )
          if [ "${#apks[@]}" -eq 0 ]; then
            echo "ERROR: No APK found under $APK_DIR" >&2
            echo "Searching for any .apk under $BUILD_DIR/app/android/app/build (debug listing):" >&2
            find "$BUILD_DIR/app/android/app/build" -name '*.apk' -print 2>/dev/null || true
            exit 1
          fi
          echo "found_apk_count: ${#apks[@]}"
          for a in "${apks[@]}"; do
            ls -la "$a"
            echo "produced_apk_path: $a"
          done
    artifacts:
      - app/android/app/build/outputs/apk/release/*.apk

  closed_release:
    name: closed_release
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      android_signing:
        - 0027_upload
    scripts:
      - name: Write Android local.properties
        script: |
          set -e
          ROOT="$(pwd)"
          FLUTTER_BIN="$(command -v flutter)"
          FLUTTER_ROOT="$(dirname "$(dirname "$FLUTTER_BIN")")"
          SDK="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          test -n "$SDK"
          printf 'sdk.dir=%s\nflutter.sdk=%s\n' "$SDK" "$FLUTTER_ROOT" > "$ROOT/app/android/local.properties"
      - name: Flutter pub get
        script: |
          set -e
          cd app
          flutter pub get
      - name: Flutter tests (exclude store listing goldens)
        script: |
          set -e
          cd app
          flutter test --exclude-tags store_listing
      - name: Gradle bundleRelease (no flutter build appbundle)
        script: |
          set -e
          cd app/android
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon --stacktrace
      - name: Verify AAB output path
        script: |
          set -e
          ROOT="$(pwd)"
          ls -la "$ROOT/app/build/app/outputs/bundle/release/"*.aab
    artifacts:
      - app/build/app/outputs/bundle/release/*.aab

