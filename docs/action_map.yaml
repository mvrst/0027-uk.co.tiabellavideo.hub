  # --- Screen 01 — Splash (/splash) ---
  - element_id: splash_root_continue
    screen: S01
    design_note: No explicit CTA; implementation chooses one documented strategy (timer or full-screen tap).
    type: internal
    destination: /onboarding/intro
    test_key: TK_S01_CONTINUE

  - element_id: splash_footer_domain
    screen: S01
    label: "tiabellavideo.co.uk"
    type: external
    action: open_url
    url: "https://tiabellavideo.co.uk"
    test_key: TK_S01_FOOTER_WEBSITE

