# Action map — every tappable control → internal route or external / system action
# Source: artifacts/design/0027.pen. Do not add features not present in design.
# <PRIVACY_POLICY_URL> == PRIVACY_POLICY_URL (same literal string as routes.yaml).

version: 1
PRIVACY_POLICY_URL: "https://tiabellavideo.co.uk/privacy-policy"

conventions:
  internal: navigate_replace_or_push
  external: android_intent_or_equivalent
  local_state: in_memory_or_shared_preferences
  # Bottom pill tabs: reuse the same ValueKeys (TK_TAB_*) on every screen where the design includes the tab bar.
  tab_bar_screens: [S04, S05, S05B, S05C, S05D, S07, S09, S10, S11, S12, S13]
  no_tab_bar_screens: [S01, S02, S03, S06, S08, S14]

